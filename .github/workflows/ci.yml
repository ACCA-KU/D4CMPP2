name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Incremental static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Run pinned incremental static checks
        run: bash tests/ci_static_checks.sh

  fast-unit:
    name: Fast unit (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Run dependency-light tests
        run: python -m unittest discover -s tests -v

  pyg-cpu:
    name: PyG CPU suite (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimum
            python: "3.10"
            install: |
              # PyTorch 2.2 wheels use the NumPy 1.x ABI.
              python -m pip install "numpy<2"
              python -m pip install torch==2.2.0 torch-geometric==2.8.0
              python -m pip install .
          - profile: latest
            python: "3.12"
            install: python -m pip install --upgrade .
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package and test dependencies
        run: ${{ matrix.install }}
      - name: Run full CPU test suite
        env:
          D4CMPP2_RUN_HEAVY: "1"
          CUDA_VISIBLE_DEVICES: ""
        run: python -m unittest discover -s tests -v

  wheel:
    name: Clean wheel install and quickstart
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install build and runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Build, inspect, install, and run CPU quickstart
        run: bash tests/ci_artifact_checks.sh
