name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # tomllib, used by the release-version guard below, is built in on 3.11+.
          # This only selects the isolated build runner; package support remains 3.10+.
          python-version: "3.11"
          cache: pip

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match pyproject.toml version '$package_version'." >&2
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.3.0
          python -m build --outdir dist

      - name: Verify distribution contents and metadata
        run: python tests/check_distribution_artifacts.py dist

      - name: Store verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/D4CMPP2/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
